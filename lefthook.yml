pre-commit:
  jobs:
    - name: prettier
      glob: '*.{ts,tsx,json,md,css}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    - name: eslint
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm tsc --noEmit

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
